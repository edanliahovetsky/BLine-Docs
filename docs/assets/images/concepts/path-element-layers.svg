<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">BLine path element layers</title>
  <desc id="desc">Three translation anchors form two straight path segments. A rotation target and an event trigger are placed by geometric progress along the first segment without changing its shape.</desc>
  <defs>
    <marker id="path-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker>
  </defs>
  <rect width="1200" height="520" rx="18" fill="#f8fafc"/>
  <text x="60" y="52" fill="#0f172a" font-family="system-ui, sans-serif" font-size="28" font-weight="700">Path elements: geometry and behavior share one order</text>

  <g transform="translate(65 92)" font-family="system-ui, sans-serif">
    <rect width="1070" height="330" rx="15" fill="#ffffff" stroke="#cbd5e1"/>

    <text x="28" y="50" fill="#1d4ed8" font-size="18" font-weight="700">Translation layer</text>
    <text x="28" y="75" fill="#475569" font-size="15">anchors create straight segments</text>
    <path d="M175 118 L650 118 L930 205" fill="none" stroke="#2563eb" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="175" cy="118" r="17" fill="#ffffff" stroke="#1d4ed8" stroke-width="6"/>
    <circle cx="650" cy="118" r="17" fill="#ffffff" stroke="#1d4ed8" stroke-width="6"/>
    <circle cx="930" cy="205" r="17" fill="#ffffff" stroke="#1d4ed8" stroke-width="6"/>
    <text x="175" y="92" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="700">anchor A</text>
    <text x="650" y="92" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="700">anchor B</text>
    <text x="930" y="179" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="700">anchor C</text>

    <line x1="175" y1="225" x2="650" y2="225" stroke="#94a3b8" stroke-width="3"/>
    <line x1="175" y1="210" x2="175" y2="240" stroke="#64748b" stroke-width="3"/>
    <line x1="650" y1="210" x2="650" y2="240" stroke="#64748b" stroke-width="3"/>
    <text x="175" y="265" text-anchor="middle" fill="#475569" font-size="14">t-ratio 0</text>
    <text x="650" y="265" text-anchor="middle" fill="#475569" font-size="14">t-ratio 1</text>

    <g transform="translate(342 225) rotate(45)"><rect x="-17" y="-17" width="34" height="34" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/></g>
    <line x1="342" y1="205" x2="342" y2="118" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="300" y="300" text-anchor="middle" fill="#b91c1c" font-size="16" font-weight="700">rotation target</text>
    <text x="300" y="322" text-anchor="middle" fill="#475569" font-size="14">heading setpoint</text>

    <path d="M510 207 L530 243 L490 243 Z" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
    <line x1="510" y1="205" x2="510" y2="118" stroke="#d97706" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="555" y="300" text-anchor="middle" fill="#b45309" font-size="16" font-weight="700">event trigger</text>
    <text x="555" y="322" text-anchor="middle" fill="#475569" font-size="14">robot action at progress</text>

    <text x="760" y="278" fill="#0f172a" font-size="16" font-weight="700">A new anchor creates a new segment.</text>
    <text x="760" y="302" fill="#475569" font-size="15">Rotation and events live on a segment;</text>
    <text x="760" y="324" fill="#475569" font-size="15">they do not bend the route.</text>
  </g>

  <g transform="translate(65 452)" font-family="system-ui, sans-serif">
    <rect width="1070" height="42" rx="10" fill="#e2e8f0"/>
    <text x="535" y="27" text-anchor="middle" fill="#0f172a" font-size="16">Element order defines geometry and sequencing; live geometric progress—not elapsed time—activates segment behavior.</text>
  </g>
</svg>
