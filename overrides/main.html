{% extends "base.html" %}

{% block extrahead %}
<style>
  /* Critical syntax colors stay inline after Material's stylesheets. Safari
     then resolves the same cascade on full reload and instant navigation. */
  [data-md-color-scheme="slate"] {
    --md-code-hl-color: rgba(125, 211, 252, 0.14);
    --md-code-hl-number-color: #f9a8d4;
    --md-code-hl-special-color: #c4b5fd;
    --md-code-hl-function-color: #7dd3fc;
    --md-code-hl-constant-color: #f9a8d4;
    --md-code-hl-keyword-color: #fb7185;
    --md-code-hl-string-color: #86efac;
    --md-code-hl-name-color: #e2e8f0;
    --md-code-hl-operator-color: #fdba74;
    --md-code-hl-punctuation-color: #cbd5e1;
    --md-code-hl-comment-color: #94a3b8;
    --md-code-hl-generic-color: #e2e8f0;
    --md-code-hl-variable-color: #e2e8f0;
  }
  [data-md-color-scheme="default"] {
    --md-code-hl-color: rgba(2, 132, 199, 0.12);
    --md-code-hl-number-color: #be185d;
    --md-code-hl-special-color: #6d28d9;
    --md-code-hl-function-color: #0369a1;
    --md-code-hl-constant-color: #be185d;
    --md-code-hl-keyword-color: #be123c;
    --md-code-hl-string-color: #15803d;
    --md-code-hl-name-color: #1e293b;
    --md-code-hl-operator-color: #c2410c;
    --md-code-hl-punctuation-color: #475569;
    --md-code-hl-comment-color: #64748b;
    --md-code-hl-generic-color: #1e293b;
    --md-code-hl-variable-color: #1e293b;
  }
  .highlight .na,
  .highlight .nf,
  .highlight .fm {
    color: var(--md-code-hl-function-color);
  }
  .highlight .nc,
  .highlight .nn,
  .highlight .nd {
    color: var(--md-code-hl-special-color);
  }

  /* Safari can defer repainting token colors inherited through custom
     properties after a full reload. Assign concrete colors to Pygments token
     classes so syntax rendering does not depend on that repaint lifecycle. */
  .highlight span {
    -webkit-text-fill-color: currentColor;
  }
  [data-md-color-scheme="slate"] .highlight :is(.c, .ch, .cm, .cp, .cpf, .c1, .cs) {
    color: #94a3b8;
  }
  [data-md-color-scheme="slate"] .highlight :is(.k, .kc, .kd, .kn, .kp, .kr, .kt) {
    color: #fb7185;
  }
  [data-md-color-scheme="slate"] .highlight :is(.o, .ow) {
    color: #fdba74;
  }
  [data-md-color-scheme="slate"] .highlight .p {
    color: #cbd5e1;
  }
  [data-md-color-scheme="slate"] .highlight :is(.s, .sa, .sb, .sc, .dl, .sd, .s2, .se, .sh, .si, .sx, .sr, .s1, .ss) {
    color: #86efac;
  }
  [data-md-color-scheme="slate"] .highlight :is(.na, .nf, .fm) {
    color: #7dd3fc;
  }
  [data-md-color-scheme="slate"] .highlight :is(.nc, .nn, .nd) {
    color: #c4b5fd;
  }
  [data-md-color-scheme="slate"] .highlight :is(.m, .mb, .mf, .mh, .mi, .mo, .il, .no) {
    color: #f9a8d4;
  }
  [data-md-color-scheme="slate"] .highlight :is(.n, .nb, .bp, .ni, .ne, .nl, .nt, .nv, .vc, .vg, .vi, .vm) {
    color: #e2e8f0;
  }
  [data-md-color-scheme="default"] .highlight :is(.c, .ch, .cm, .cp, .cpf, .c1, .cs) {
    color: #64748b;
  }
  [data-md-color-scheme="default"] .highlight :is(.k, .kc, .kd, .kn, .kp, .kr, .kt) {
    color: #be123c;
  }
  [data-md-color-scheme="default"] .highlight :is(.o, .ow) {
    color: #c2410c;
  }
  [data-md-color-scheme="default"] .highlight .p {
    color: #475569;
  }
  [data-md-color-scheme="default"] .highlight :is(.s, .sa, .sb, .sc, .dl, .sd, .s2, .se, .sh, .si, .sx, .sr, .s1, .ss) {
    color: #15803d;
  }
  [data-md-color-scheme="default"] .highlight :is(.na, .nf, .fm) {
    color: #0369a1;
  }
  [data-md-color-scheme="default"] .highlight :is(.nc, .nn, .nd) {
    color: #6d28d9;
  }
  [data-md-color-scheme="default"] .highlight :is(.m, .mb, .mf, .mh, .mi, .mo, .il, .no) {
    color: #be185d;
  }
  [data-md-color-scheme="default"] .highlight :is(.n, .nb, .bp, .ni, .ne, .nl, .nt, .nv, .vc, .vg, .vi, .vm) {
    color: #1e293b;
  }

  /* Custom header links */
  .custom-header-links {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-right: 0.5rem;
  }
  .custom-header-links a {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.4rem 0.6rem;
    border-radius: 0.25rem;
    color: var(--md-primary-bg-color);
    text-decoration: none;
    font-size: 0.7rem;
    font-weight: 600;
    opacity: 0.9;
    background: rgba(255, 255, 255, 0.1);
    transition: background 0.2s, opacity 0.2s;
  }
  .custom-header-links a:hover {
    opacity: 1;
    background: rgba(255, 255, 255, 0.2);
  }
  .custom-header-links svg {
    width: 1rem;
    height: 1rem;
    fill: currentColor;
  }
  @media screen and (max-width: 60em) {
    .custom-header-links span {
      display: none;
    }
    .custom-header-links a {
      padding: 0.4rem;
    }
  }
  @media screen and (max-width: 45em) {
    .custom-header-links {
      display: none;
    }
  }
</style>
{% endblock %}

{% block scripts %}
{{ super() }}

  if (header && search) {

});
</script>
{% endblock %}
