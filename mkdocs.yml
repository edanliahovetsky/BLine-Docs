site_name: BLine Documentation
site_description: Tutorial and reference documentation for BLine autonomous path planning and tracking
site_url: https://bline-docs.pages.dev/
site_author: BLine contributors
copyright: BLine documentation is licensed under the BSD 3-Clause License.
repo_url: https://github.com/edanliahovetsky/BLine-Docs
repo_name: Docs

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: deep orange
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.sidebar.sticky
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/solid/comments
      link: https://www.chiefdelphi.com/t/introducing-bline-a-new-rapid-polyline-autonomous-path-planning-suite/509778
      name: Chief Delphi Discussion
    - icon: fontawesome/brands/github
      link: https://github.com/edanliahovetsky/BLine-Lib
      name: BLine-Lib (GitHub)
    - icon: fontawesome/brands/github
      link: https://github.com/edanliahovetsky/BLine-Web
      name: BLine Web (GitHub)

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/gif-lazy-load.js

hooks:
  - hooks/no_cache.py

watch:
  - overrides

markdown_extensions:
  - pymdownx.highlight:
      noclasses: true
      pygments_style: material
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - with-pdf:
      output_path: BLine-Docs.pdf
      cover_title: BLine Documentation
      cover_subtitle: Tutorial and reference guide for BLine Web and BLine-Lib
      enabled_if_env: ENABLE_PDF_EXPORT

nav:
  - Home: index.md
  - Start Here:
    - Before You Begin: getting-started/prerequisites.md
    - Installation: getting-started/installation.md
    - First Path Tutorial: getting-started/quick-start.md
    - Tune Your Robot: getting-started/tuning.md
  - Understand BLine:
    - How BLine Works: concepts/design-philosophy.md
    - Path Elements: concepts/path-elements.md
    - Constraints & Ordinals: concepts/constraints.md
    - Handoffs, t-ratio & Completion: concepts/key-parameters.md
    - Events: concepts/event-triggers.md
  - BLine Web:
    - Editor Overview: gui/index.md
    - Projects, Paths & Collections: gui/menu-bar.md
    - Draw & Edit Paths: gui/canvas.md
    - Constraints & Optimizer: gui/sidebar.md
    - Linked Elements: gui/linked-elements.md
    - Simulation: gui/simulation.md
    - Fields, Footprint & Protrusions: gui/protrusions.md
    - Import, Export & Backups: gui/exporting.md
  - BLine Lib:
    - Overview: lib/index.md
    - Follow Paths: lib/follow-path.md
    - Construct Paths & JSON: lib/path-construction.md
    - Events & Command Groups: lib/event-triggers.md
    - Rotation Overrides: lib/rotation-overrides.md
    - Optional Field2d Visualization: lib/field-visualization.md
    - Alliance Flip & Mirror: lib/flip-and-mirror.md
    - Pre-Match Module Orientation: lib/pre-match.md
    - Logging & AdvantageScope: lib/logging.md
  - Recipes & Troubleshooting:
    - Practical Recipes: usage-tips.md
    - Common Issues: common-issues.md
  - Reference:
    - API Reference: lib/api-reference.md
    - Versions & Support: reference/versions.md
    - Keyboard Shortcuts: reference/keyboard-shortcuts.md
